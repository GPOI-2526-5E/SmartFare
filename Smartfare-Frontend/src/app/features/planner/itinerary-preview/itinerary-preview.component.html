<div class="ip-page">
  <app-navbar></app-navbar>

  <main class="ip-main">
    <div class="ip-shell">
      <app-preview-actions
        [isOwner]="isOwner()"
        [isFavorite]="isFavorite()"
        [isSaving]="isSaving()"
        [isCopying]="isCopying()"
        [isLoading]="isLoading()"
        [hasItinerary]="!!itinerary()"
        [isReadOnlyViewer]="isReadOnlyViewer()"
        (back)="goBack()"
        (favoriteToggle)="toggleFavorite()"
        (primaryAction)="primaryAction()"
      />

      @if (isLoading()) {
        <div class="ip-state">
          <div class="ip-state__spinner"></div>
          <p>Caricamento anteprima…</p>
        </div>
      } @else if (!itinerary()) {
        <div class="ip-state">
          <i class="bi bi-inbox"></i>
          <h2>Itinerario non trovato</h2>
          <p>Il link potrebbe essere scaduto o l'itinerario non è più disponibile.</p>
          <button type="button" class="ip-state__btn" (click)="goBack()">Torna a Esplora</button>
        </div>
      } @else {
        <app-preview-hero
          [title]="itinerary()!.name"
          [destination]="locationLabel()"
          [description]="itinerary()!.description || ''"
          [coverImage]="coverImage()"
          [durationLabel]="durationLabel()"
          [stopCount]="stopCount()"
          [authorName]="authorName()"
          [isPublished]="!!itinerary()!.isPublished"
        />

        <div class="ip-layout" [class.ip-layout--map]="mobileTab() === 'map'">
          <div class="ip-layout__plan" [class.ip-layout__panel--active]="mobileTab() === 'plan'">
            <app-preview-timeline
              [days]="previewDays()"
              [hasStops]="hasStops()"
            />
          </div>

          <div class="ip-layout__map" [class.ip-layout__panel--active]="mobileTab() === 'map'">
            <app-preview-map-panel
              [itinerary]="itinerary()"
              [location]="mapLocation()"
              [routePois]="mapPois()"
              [canRender]="mapCanRender()"
              [isLoading]="isLoading()"
            />
          </div>
        </div>

        <nav class="ip-tabs" aria-label="Vista mobile">
          <button
            type="button"
            class="ip-tabs__btn"
            [class.is-active]="mobileTab() === 'plan'"
            (click)="setMobileTab('plan')"
          >
            <i class="bi bi-journal-text"></i>
            Programma
          </button>
          <button
            type="button"
            class="ip-tabs__btn"
            [class.is-active]="mobileTab() === 'map'"
            (click)="setMobileTab('map')"
          >
            <i class="bi bi-map"></i>
            Mappa
          </button>
        </nav>
      }
    </div>
  </main>

  <app-footer></app-footer>
</div>

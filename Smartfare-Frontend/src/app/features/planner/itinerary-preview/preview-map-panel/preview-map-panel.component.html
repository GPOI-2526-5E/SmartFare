<div class="pvm-wrap" aria-label="Mappa del percorso">
  
  <!-- Overlay badge "Anteprima" -->
  <div class="pvm-badge" aria-hidden="true">
    <i class="bi bi-map-fill"></i>
    <span>Anteprima mappa</span>
  </div>

  <div class="pvm-frame">
    @if (canRender && itinerary) {
      <app-builder-map
        class="pvm-map-component"
        [itinerary]="itinerary"
        [isPreview]="true"
        [location]="location"
        [savedPois]="routePois"
        [routePois]="routePois"
        [availablePois]="[]"
      />
    } @else {
      <!-- Stato loading o vuoto -->
      <div class="pvm-fallback">
        <div class="pvm-fallback__bg" aria-hidden="true"></div>
        
        <div class="pvm-fallback__content">
          @if (isLoading) {
            <div class="pvm-spinner">
              <div class="pvm-spinner__ring"></div>
            </div>
            <p>Caricamento mappa…</p>
          } @else {
            <div class="pvm-empty-icon">
              <i class="bi bi-map"></i>
            </div>
            <p>Mappa non disponibile per questo itinerario.</p>
          }
        </div>
      </div>
    }
  </div>

</div>

<section class="wl-section">
  <div class="wl-section-header">
    <h2><i class="bi bi-chevron-down"></i> Esplora itinerari</h2>
    <button class="wl-btn-primary"><i class="bi bi-search"></i> Sfoglia tutto</button>
  </div>

  <div class="wl-explore-grid">
    @for (itin of publicItineraries(); track itin.id) {
    <div class="wl-explore-card" (click)="onPreviewClick(itin)">
      <div class="wl-explore-img">
        <img
          [src]="itin.imageUrl"
          alt="Preview">
        <div class="wl-explore-badge">Itinerario</div>
      </div>
      <div class="wl-explore-info">
        <h3>{{ itin.name }}</h3>
        <p>{{ itin.description || 'Scopri questo fantastico itinerario' }}</p>
        <div class="wl-explore-footer">
          <div class="wl-provider">
            <div class="wl-provider-icon">
              <img [src]="itin.user?.profile?.avatarUrl || '/assets/home-section.avif'" alt="User">
            </div>
            <span>{{ itin.user?.profile?.name || 'Utente' }}</span>
          </div>
          <button class="wl-apply-btn" (click)="$event.stopPropagation(); onPreviewClick(itin)">Vedi anteprima</button>
        </div>
      </div>
    </div>
    } @empty {
    <div class="wl-no-explore">
      <i class="bi bi-info-circle"></i>
      <p>Nessun itinerario pubblico trovato per questa posizione.</p>
    </div>
    }
  </div>
</section>

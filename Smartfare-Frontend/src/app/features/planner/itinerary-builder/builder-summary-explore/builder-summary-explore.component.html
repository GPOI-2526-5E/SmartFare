<section class="wl-section">
  <div class="wl-section-header">
    <h2><i class="bi bi-chevron-down"></i> Esplora itinerari</h2>
    <button class="wl-btn-primary" [routerLink]="['/discover']"><i class="bi bi-search"></i> Sfoglia tutto</button>
  </div>

  <div class="wl-explore-grid">
    @for (itin of publicItineraries(); track itin.id) {
    <app-itinerary-card [itinerary]="itin" mode="emit" (cardClick)="onPreviewClick($event)"></app-itinerary-card>
    } @empty {
    <div class="wl-no-explore">
      <i class="bi bi-info-circle"></i>
      <p>Nessun itinerario pubblico trovato per questa posizione.</p>
    </div>
    }
  </div>
</section>

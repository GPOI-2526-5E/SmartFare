<header class="builder-header">
  <!-- Top Toolbar -->
  <div class="top-toolbar">
    <div class="toolbar-left">
      <a href="/home" (click)="onNavRequest('/home', $event)" class="brand anchor-reset">
        <img src="favicon.png" alt="logo" class="logo-small">
        <span class="brand-name">SMARTFARE</span>
      </a>
      <div class="itinerary-name-container">
        <input type="text" class="itinerary-name-input" [ngModel]="itinerary()?.name"
          (ngModelChange)="updateName($event)" placeholder="Senza titolo">
        <span class="save-status" [ngClass]="{
          'is-saving': autosaveStatus() === 'saving',
          'is-error': autosaveStatus() === 'error'
        }">
          <i [class]="saveStatusIcon"></i>
        </span>
      </div>
    </div>

    <div class="toolbar-right">
      <div class="dropdown">
        <div class="user-avatar pointer" data-bs-toggle="dropdown" aria-expanded="false">
          @if (user()?.avatarUrl) {
          <img [src]="user()?.avatarUrl" [alt]="user()?.name" class="avatar-img" referrerpolicy="no-referrer">
          } @else {
          {{ user()?.name?.charAt(0) || 'U' }}{{ user()?.surname?.charAt(0) || '' }}
          }
        </div>
        <ul class="dropdown-menu dropdown-menu-end mt-2 p-2 shadow-sm rounded-3">
          @if (isAuthenticated()) {
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/itineraries']">
              <i class="bi bi-journal-bookmark"></i>
              <span>I miei Itinerari</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/favorites']">
              <i class="bi bi-heart"></i>
              <span>Preferiti</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/settings']">
              <i class="bi bi-gear"></i>
              <span>Impostazioni</span>
            </a>
          </li>
          <li>
            <hr class="dropdown-divider border-white-10">
          </li>
          } @else {
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/login']">
              <i class="bi bi-person"></i>
              <span>Accedi</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/register']">
              <i class="bi bi-person-plus"></i>
              <span>Registrati</span>
            </a>
          </li>
          <li>
            <hr class="dropdown-divider border-white-10">
          </li>
          }

          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="/home"
              (click)="onNavRequest('/home', $event)">
              <i class="bi bi-house"></i>
              <span>Torna alla Home</span>
            </a>
          </li>
          <li>
            <button class="dropdown-item d-flex align-items-center gap-2 py-2 text-success-light"
              (click)="saveItinerary()">
              <i class="bi bi-cloud-arrow-up"></i>
              <span>Salva nei miei itinerari</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Bottom Toolbar (Planner Controls) -->
  <div class="bottom-toolbar">
    <div class="toolbar-group">
      <div class="control-wrapper">
        <label for="category-select" class="control-label">Filtra per categoria</label>
        <select id="category-select" class="toolbar-select" (change)="onCategoryChange($event)">
          <option value="all">Tutte le categorie</option>
          @for (cat of categories(); track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="toolbar-group divider-left">
      <button class="toolbar-btn" (click)="showSelectedMarkers()"
        title="Mostra solo i marker delle attività selezionate">
        <i class="bi bi-pin-map"></i>
        <span>Mostra selezionati</span>
      </button>
      <button class="toolbar-btn" (click)="showAreaMarkers()" title="Mostra tutti i marker disponibili in questa zona">
        <i class="bi bi-geo"></i>
        <span>Mostra tutti in zona</span>
      </button>
    </div>

    <div class="toolbar-group divider-left">
      <div class="control-wrapper">
        <label class="control-label">Colore Marker</label>
        <div class="color-picker-container">
          <input type="color" [value]="ui.markerColor()" (input)="onColorChange($event)" class="toolbar-color-input">
          <div class="color-preview" [style.background-color]="ui.markerColor()"></div>
        </div>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="toolbar-group">
      <button class="toolbar-btn icon-only" [class.active]="ui.showSidebar()" (click)="ui.toggleSidebar()"
        title="Toggle Sidebar">
        <i class="bi bi-layout-sidebar"></i>
      </button>
      <button class="toolbar-btn icon-only" [class.active]="ui.showChat()" (click)="ui.toggleChat()"
        title="Toggle AI Chat">
        <i class="bi bi-chat-dots"></i>
      </button>
    </div>
  </div>
</header>

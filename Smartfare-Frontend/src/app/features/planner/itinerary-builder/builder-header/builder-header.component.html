<header class="builder-header">
  <div class="top-toolbar">
    <div class="toolbar-left">
      <a href="/home" (click)="onNavRequest('/home', $event)" class="brand anchor-reset">
        <img src="favicon.png" alt="logo" class="logo-small">
        <div class="brand-copy">
          <span class="brand-name">SMARTFARE</span>
          <span class="brand-sub">Journey Studio</span>
        </div>
      </a>

      <div class="itinerary-name-container">
        <i class="bi bi-pencil-square name-edit-icon"></i>
        <input type="text" class="itinerary-name-input" [ngModel]="itinerary()?.name"
          (ngModelChange)="updateName($event)" placeholder="Dai un nome al viaggio">
        <span class="save-status" [ngClass]="{
          'is-saving': autosaveStatus() === 'saving',
          'is-error': autosaveStatus() === 'error'
        }">
          <i [class]="saveStatusIcon"></i>
        </span>
      </div>
    </div>

    <div class="toolbar-right">
      <button type="button" class="save-cta" (click)="saveItinerary()">
        <i class="bi bi-cloud-arrow-up"></i>
        <span>Salva</span>
      </button>

      <div class="dropdown">
        <button type="button" class="user-avatar pointer" data-bs-toggle="dropdown" aria-expanded="false">
          @if (user()?.avatarUrl) {
          <img [src]="user()?.avatarUrl" [alt]="user()?.name" class="avatar-img" referrerpolicy="no-referrer">
          } @else {
          {{ user()?.name?.charAt(0) || 'U' }}{{ user()?.surname?.charAt(0) || '' }}
          }
        </button>

        <ul class="dropdown-menu dropdown-menu-end mt-2 p-2 shadow-sm rounded-3">
          @if (isAuthenticated()) {
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/itineraries']">
              <i class="bi bi-journal-bookmark"></i>
              <span>I miei itinerari</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/favorites']">
              <i class="bi bi-heart"></i>
              <span>Preferiti</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/settings']">
              <i class="bi bi-gear"></i>
              <span>Impostazioni</span>
            </a>
          </li>
          <li>
            <hr class="dropdown-divider border-white-10">
          </li>
          } @else {
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/login']">
              <i class="bi bi-person"></i>
              <span>Accedi</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" [routerLink]="['/register']">
              <i class="bi bi-person-plus"></i>
              <span>Registrati</span>
            </a>
          </li>
          <li>
            <hr class="dropdown-divider border-white-10">
          </li>
          }
          <li>
            <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="/home"
              (click)="onNavRequest('/home', $event)">
              <i class="bi bi-house"></i>
              <span>Torna alla home</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="bottom-toolbar">
    <section class="toolbar-section toolbar-section--base">
      <span class="section-label">Destinazione</span>
      <div class="btn-group-pill">
        <button class="pill-btn" type="button" (click)="changeLocationRequest.emit()">
          <i class="bi bi-arrow-repeat"></i>
          <span>Cambia</span>
        </button>
        <button class="pill-btn pill-btn--location" type="button" disabled>
          <i class="bi bi-geo-alt-fill"></i>
          <span>{{ workspace?.location?.name || 'Nessuna località' }}</span>
        </button>
      </div>
    </section>

    <div class="v-divider"></div>

    @if (ui.activeSurface() === 'sidebar') {
    <section class="toolbar-section">
      <span class="section-label">Contenuto</span>
      <div class="segmented-group">
        <button class="seg-btn" [class.active]="ui.selectedType() === 'all'" (click)="onTypeChangeDirect('all')">
          <i class="bi bi-grid-3x3-gap-fill"></i>
          <span>Tutto</span>
        </button>
        <button class="seg-btn" [class.active]="ui.selectedType() === 'accommodation'"
          (click)="onTypeChangeDirect('accommodation')">
          <i class="bi bi-building"></i>
          <span>Hotel</span>
        </button>
        <button class="seg-btn" [class.active]="ui.selectedType() === 'activity'"
          (click)="onTypeChangeDirect('activity')">
          <i class="bi bi-lightning-charge-fill"></i>
          <span>Attività</span>
        </button>
      </div>
    </section>

    <section class="toolbar-section">
      <span class="section-label">Categoria</span>
      <div class="select-wrapper">
        <i class="bi bi-tags select-icon"></i>
        <select id="category-select" class="toolbar-select" (change)="onCategoryChange($event)">
          <option value="all">Tutte le categorie</option>
          @for (cat of workspace?.categories || []; track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
          }
        </select>
        <i class="bi bi-chevron-down select-chevron"></i>
      </div>
    </section>
    } @else {
    <section class="toolbar-section">
      <span class="section-label">Vista mappa</span>
      <div class="btn-group-pill">
        <button class="pill-btn" (click)="showSelectedMarkers()" title="Mostra solo i marker salvati">
          <i class="bi bi-pin-map-fill"></i>
          <span>Salvati</span>
        </button>
        <button class="pill-btn" (click)="showAreaMarkers()" title="Mostra tutti i punti in zona">
          <i class="bi bi-geo-alt-fill"></i>
          <span>In zona</span>
        </button>
      </div>
    </section>

    <section class="toolbar-section">
      <span class="section-label">Colore marker</span>
      <label class="color-swatch-label" title="Cambia colore marker">
        <input type="color" [value]="ui.markerColor()" (input)="onColorChange($event)" class="hidden-color-input">
        <span class="color-swatch" [style.background-color]="ui.markerColor()"></span>
      </label>
    </section>
    }

    <div class="spacer"></div>

    <section class="toolbar-section toolbar-section--layout">
      <span class="section-label">Layout</span>
      <div class="toggle-group">
        <button class="toggle-btn" [class.active]="ui.showSidebar()" (click)="ui.toggleSidebar()" title="Sidebar">
          <i class="bi bi-layout-sidebar"></i>
          <span class="toggle-label">Sidebar</span>
        </button>
        <button class="toggle-btn" [class.active]="ui.showSummary()" (click)="ui.toggleSummary()"
          title="Riepilogo viaggio">
          <i class="bi bi-journal-text"></i>
          <span class="toggle-label">Riepilogo</span>
        </button>
        <button class="toggle-btn" [class.active]="ui.showChat()" (click)="ui.toggleChat()" title="Area AI">
          <i class="bi bi-stars"></i>
          <span class="toggle-label">AI</span>
        </button>
      </div>
    </section>
  </div>
</header>

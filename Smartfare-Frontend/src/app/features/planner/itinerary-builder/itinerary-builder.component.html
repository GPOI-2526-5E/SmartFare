<div class="builder-container">
    <!-- Header with toolbars -->
    <app-builder-header [workspace]="workspace()" (navRequest)="handleNavigationIntercept($event)"
        (changeLocationRequest)="onChangeLocationRequest()" (saveRequest)="handleSaveRequest()">
    </app-builder-header>

    <!-- Main Workspace divided in 3 horizontal sections -->
    <main class="builder-workspace">
        <!-- Section 1: Hotel/Activity selection (Left) -->
        @if (ui.showSidebar()) {
        <aside class="workspace-sidebar">
            <app-builder-sidebar [workspace]="workspace()" [savedPoiKeys]="savedPoiKeys()"
                (focusSidebar)="onSidebarFocused()" (previewPoi)="onPreviewPoi($event)" (addPoi)="onAddPoi($event)">
            </app-builder-sidebar>
        </aside>
        }

        <!-- Section 2: Map visualization (Center) -->
        <section class="workspace-map">
            @if (!ui.showSummary()) {
            <app-builder-map [location]="workspace()?.location || null" [savedPois]="filteredSavedPois()"
                [routePois]="savedPois()" [availablePois]="mapAvailablePois()" [previewPoi]="previewPoi()"
                [markerColor]="ui.markerColor()" (mapFocused)="onMapFocused()">
            </app-builder-map>
            } @else {
            <app-builder-summary [workspace]="workspace()" [savedPois]="savedPois()" (showOnMap)="onPreviewPoi($event)">
            </app-builder-summary>
            }
        </section>

        <!-- Section 3: AI Chat (Right) -->
        @if (ui.showChat()) {
        <aside class="workspace-chat">
            <app-builder-chat></app-builder-chat>
        </aside>
        }
    </main>

    @if (isLoadingWorkspace()) {
    <div class="builder-overlay">Caricamento destinazione...</div>
    }

    @if (workspaceError()) {
    <div class="builder-overlay builder-overlay-error">
        <div>
            <p>{{ workspaceError() }}</p>
            <button class="btn btn-light" (click)="onChangeLocationRequest()">Scegli destinazione</button>
        </div>
    </div>
    }

    <!-- Modals -->
    @if (showLoginPrompt()) {
    <app-login-prompt-modal (login)="onLoginRedirect()" (continueWithoutSaving)="onContinueExit()"
        (close)="closeModal()">
    </app-login-prompt-modal>
    }
</div>

<div class="builder-container">
    <!-- Header with toolbars -->
    <app-builder-header 
        (navRequest)="handleNavigationIntercept($event)"
        (saveRequest)="handleSaveRequest()">
    </app-builder-header>

    <!-- Main Workspace divided in 3 horizontal sections -->
    <main class="builder-workspace">
        <!-- Section 1: Hotel/Activity selection (Left) -->
        @if (ui.showSidebar()) {
            <aside class="workspace-sidebar">
                <app-builder-sidebar></app-builder-sidebar>
            </aside>
        }

        <!-- Section 2: Map visualization (Center) -->
        <section class="workspace-map">
            <app-builder-map></app-builder-map>
        </section>

        <!-- Section 3: AI Chat (Right) -->
        @if (ui.showChat()) {
            <aside class="workspace-chat">
                <app-builder-chat></app-builder-chat>
            </aside>
        }
    </main>

    <!-- Modals -->
    @if (showLoginPrompt()) {
        <app-login-prompt-modal
            (login)="onLoginRedirect()"
            (continueWithoutSaving)="onContinueExit()"
            (close)="closeModal()">
        </app-login-prompt-modal>
    }
</div>

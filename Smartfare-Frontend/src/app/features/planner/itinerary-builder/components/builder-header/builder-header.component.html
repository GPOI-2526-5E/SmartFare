<header class="builder-header">
    <!-- Top Toolbar -->
    <div class="top-toolbar">
        <div class="toolbar-left">
            <a [routerLink]="['/home']" class="brand anchor-reset">
                <img src="favicon.png" alt="logo" class="logo-small">
                <span class="brand-name">SMARTFARE</span>
            </a>
            <div class="status-badge">
                <span class="dot"></span>
                Bozza
            </div>
            <div class="header-actions">
                <button class="icon-btn"><i class="bi bi-list"></i></button>
                <button class="icon-btn"><i class="bi bi-layers"></i></button>
                <button class="icon-btn"><i class="bi bi-cloud-check"></i></button>
            </div>
        </div>

        <div class="toolbar-right">
            <div class="collaborators">
                <button class="icon-btn-ghost"><i class="bi bi-people"></i></button>
                <button class="icon-btn-ghost"><i class="bi bi-chat-left-dots"></i></button>
                <button class="icon-btn-ghost"><i class="bi bi-play-circle"></i></button>
                <button class="icon-btn-ghost"><i class="bi bi-camera-video"></i></button>
            </div>
            
            <button class="btn-share">
                <i class="bi bi-send-fill"></i>
                Condividere
            </button>
            
            <button class="icon-btn-ghost ms-2"><i class="bi bi-link-45deg"></i></button>
            
            <div class="user-avatar ms-3">
                DN
            </div>
        </div>
    </div>

    <!-- Bottom Toolbar (Formatting) -->
    <div class="bottom-toolbar">
        <div class="format-group border-end pe-3 me-3">
            <button class="toolbar-tool"><i class="bi bi-brush"></i></button>
        </div>
        
        <div class="format-group">
            <div class="font-selector">
                Inter <i class="bi bi-chevron-down ms-2"></i>
            </div>
            <div class="font-size">
                10 pt <i class="bi bi-chevron-expand ms-2"></i>
            </div>
        </div>

        <div class="format-group divider-left">
            <button class="format-btn">B</button>
            <button class="format-btn">I</button>
            <button class="format-btn">U</button>
            <button class="format-btn text-color-btn">
                A <div class="color-indicator"></div>
            </button>
            <button class="format-btn"><i class="bi bi-text-left"></i></button>
            <button class="format-btn"><i class="bi bi-list-ul"></i></button>
        </div>

        <div class="format-group divider-left">
            <button class="format-btn"><i class="bi bi-circle"></i></button>
            <button class="format-btn active-tool"><i class="bi bi-pentagon"></i></button>
            <button class="format-btn"><i class="bi bi-hash"></i></button>
            <button class="format-btn"><i class="bi bi-sticky"></i></button>
        </div>

        <div class="format-group divider-left">
            <button class="format-btn"><i class="bi bi-dash-lg"></i></button>
            <button class="format-btn"><i class="bi bi-distribute-vertical"></i></button>
            <button class="format-btn">Nessuna <i class="bi bi-chevron-down ms-1"></i></button>
            <button class="format-btn"><i class="bi bi-arrow-right-short"></i></button>
            <button class="format-btn">Nessuna <i class="bi bi-chevron-down ms-1"></i></button>
        </div>

        <div class="spacer"></div>

        <div class="format-group">
            <button class="icon-btn-ghost"><i class="bi bi-layout-sidebar"></i></button>
        </div>
    </div>
</header>

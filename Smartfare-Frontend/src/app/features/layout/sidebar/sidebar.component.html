<aside class="rail" [class.collapsed]="!isSidebarOpen()">
  <header class="rail-head">
    <button class="fold-btn" (click)="toggleSidebar()" type="button" title="Espandi o chiudi menu">
      <i class="bi" [class.bi-layout-sidebar-inset]="isSidebarOpen()" [class.bi-layout-sidebar]="!isSidebarOpen()"></i>
    </button>

    <div class="brand-stack">
      <h1>SmartFare</h1>
      <p>Urban Journey Planner</p>
    </div>
  </header>

  <section class="profile-chip">
    <span class="avatar">SF</span>
    <div class="meta">
      <strong>Guest Mode</strong>
      <small>Organizza viaggi smart</small>
    </div>
  </section>

  <nav class="rail-nav" aria-label="Navigazione principale">
    @for (item of navigation; track $index) {
    <a [routerLink]="[item.path]" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.path === '/'}"
      class="nav-link" [attr.data-label]="item.label">
      <i [class]="'bi ' + item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
    }

    <div class="nav-divider"></div>

    @for (item of secondary; track $index) {
    <a [routerLink]="[item.path]" routerLinkActive="active" class="nav-link" [attr.data-label]="item.label">
      <i [class]="'bi ' + item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
    }
  </nav>

  <a class="about-section" [routerLink]="['/about']" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    <h3>Chi siamo</h3>
    <p>SmartFare è il tuo compagno ideale per organizzare viaggi urbani efficienti e convenienti.</p>
  </a>

  <footer class="rail-foot">
    <button [routerLink]="['/login']" type="button" class="action ghost">
      <i class="bi bi-box-arrow-in-right"></i>
      <span>Accedi</span>
    </button>
    <button [routerLink]="['/register']" class="action solid">
      <i class="bi bi-person-plus"></i>
      <span>Registrati</span>
    </button>
  </footer>
</aside>

<aside class="map-panel">
  <div class="map-toolbar">
    <div>
      <h3>London</h3>
      <p>Curated stays near central attractions</p>
    </div>

    <div class="map-actions">
      <button type="button" aria-label="Open map">
        <i class="bi bi-box-arrow-up-right"></i>
      </button>
      <button type="button" aria-label="Center map">
        <i class="bi bi-crosshair"></i>
      </button>
    </div>
  </div>

  <div class="map-surface">
    <div class="map-water"></div>
    <div class="map-road road-a"></div>
    <div class="map-road road-b"></div>
    <div class="map-road road-c"></div>

    <div class="map-marker marker-a"><span>£899</span></div>
    <div class="map-marker marker-b"><span>£799</span></div>
    <div class="map-marker marker-c"><span>£999</span></div>

    <div class="map-label primary">London</div>
    <div class="map-label secondary">Canary Wharf</div>
  </div>
</aside>

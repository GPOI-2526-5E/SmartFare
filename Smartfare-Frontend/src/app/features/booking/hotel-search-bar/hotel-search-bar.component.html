<section class="hotel-search">
  <form class="search-form" (submit)="onSubmit($event)">
    <div class="search-field destination">
      <label for="hotel-destination"><i class="bi bi-geo-alt"></i> Destinazione</label>
      <input
        id="hotel-destination"
        type="text"
        [(ngModel)]="destination"
        name="destination"
        placeholder="Dove vuoi andare?"
        autocomplete="off"
        (focus)="openSuggestions()"
        (input)="openSuggestions()"
        (blur)="closeSuggestions()"
      >

      @if (showSuggestions && filteredLocations.length > 0) {
        <div class="location-suggestions">
          @for (location of filteredLocations; track location.id) {
            <button
              type="button"
              class="location-option"
              (mousedown)="selectLocation(location)"
            >
              <span class="location-main">{{ location.name }}</span>
              <span class="location-meta">{{ location.province }} · {{ location.cap }}</span>
            </button>
          }
        </div>
      }
    </div>

    <div class="search-field">
      <label for="hotel-checkin"><i class="bi bi-calendar-check"></i> Check-in</label>
      <input id="hotel-checkin" type="date" name="checkin" [attr.min]="today" [(ngModel)]="checkin">
    </div>

    <div class="search-field">
      <label for="hotel-checkout"><i class="bi bi-calendar-x"></i> Check-out</label>
      <input id="hotel-checkout" type="date" name="checkout" [attr.min]="today" [(ngModel)]="checkout">
    </div>

    <div class="search-field guests">
      <label for="hotel-guests"><i class="bi bi-people"></i> Ospiti</label>
      <div class="guest-inputs">
        <input id="hotel-guests" type="number" min="1" [(ngModel)]="guests" name="guests">
        <span>Persone</span>
      </div>
    </div>

    <button class="submit-btn" type="submit">
      <i class="bi bi-search"></i>
      <span>Cerca</span>
    </button>
  </form>
</section>

@if (visible()) {
<div class="smart-alert" [ngClass]="type()">
  <div class="smart-alert-inner">
    <i class="bi smart-alert-icon" [class]="iconClass()"></i>
    <div class="smart-alert-copy">
      <strong>{{ title() }}</strong>
      <p class="mb-0">{{ message() }}</p>
    </div>
    <button class="smart-alert-close" aria-label="Chiudi" (click)="close()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
</div>
}

@if (show()) {
<div class="loader-shell" aria-hidden="true">
  <!-- Dynamic Holographic Background -->
  <div class="loader-backdrop">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
</div>

<section class="loader-panel" role="status" aria-live="polite" [attr.aria-busy]="show()">
  <div class="loader-content">
    
    <!-- 3D Logo Visual -->
    <div class="loader-visual-3d">
      <div class="scene-3d">
        <div class="orbit orbit-x"></div>
        <div class="orbit orbit-y"></div>
        <div class="orbit orbit-z"></div>
        <div class="logo-container">
          <img src="https://res.cloudinary.com/dxudggkln/image/upload/v1780140804/favicon_qt7k3d.png" alt="SmartFare Logo" class="brand-logo" />
        </div>
      </div>
    </div>
  </div>
</section>
}

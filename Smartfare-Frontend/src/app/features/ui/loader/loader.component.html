@if(show) {
<div class="loader-overlay">
  <div class="loader-card" role="status" aria-live="polite" aria-busy="true">
    <p class="loader-kicker">SMARTFARE ENGINE</p>

    <div class="loader-spinner" aria-hidden="true">
      <span class="ring ring-a"></span>
      <span class="ring ring-b"></span>
      <span class="core"></span>
    </div>

    <div class="loader-steps" aria-hidden="true">
      <span>Sync dati</span>
      <span>Analisi opzioni</span>
      <span>Rendering risultati</span>
    </div>

    <p class="loader-message">{{ message }}</p>
  </div>
</div>
}

@if (show()) {
  <div class="loader-shell" aria-hidden="true">
    <div class="loader-backdrop"></div>
  </div>

  <section class="loader-panel" role="status" aria-live="polite" [attr.aria-busy]="show()">
    <div class="loader-radar" aria-hidden="true">
      <span class="radar-wave wave-one"></span>
      <span class="radar-wave wave-two"></span>
      <span class="radar-wave wave-three"></span>
      <span class="radar-sweep"></span>
      <span class="radar-core"></span>
      <span class="radar-dot dot-alpha"></span>
      <span class="radar-dot dot-beta"></span>
      <span class="radar-dot dot-gamma"></span>
    </div>
  </section>
}

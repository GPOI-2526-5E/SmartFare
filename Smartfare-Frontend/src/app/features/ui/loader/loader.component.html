@if (show()) {
<div class="loader-shell" aria-hidden="true">
  <!-- Dynamic Holographic Background -->
  <div class="loader-backdrop">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
</div>

<section class="loader-panel" role="status" aria-live="polite" [attr.aria-busy]="show()">
  <div class="loader-content">
    
    <!-- 3D Logo Visual -->
    <div class="loader-visual-3d">
      <div class="scene-3d">
        <div class="orbit orbit-x"></div>
        <div class="orbit orbit-y"></div>
        <div class="orbit orbit-z"></div>
        <div class="logo-container">
          <img src="/favicon.png" alt="SmartFare Logo" class="brand-logo" />
        </div>
      </div>
      <div class="loader-icon-badge">
        <i class="bi" [class]="phases[activePhaseIndex()].icon"></i>
      </div>
    </div>

    <!-- Premium Text & Progress -->
    <div class="loader-text">
      <h2 class="loader-brand-title">SmartFare</h2>
      <p class="loader-label-phase">{{ phases[activePhaseIndex()].label }}</p>

      <div class="progress-bar-premium">
        <div class="progress-fill" [style.width.%]="progress()">
          <div class="progress-flare"></div>
        </div>
      </div>

      <p class="loader-message-text">{{ message() }}</p>
    </div>
  </div>
</section>
}

<nav class="navbar-shell">

  <!-- TOP BAR -->
  <div class="top-bar d-flex justify-content-between align-items-center">
    <div class="left-group d-flex align-items-center gap-2">
      <i class="bi bi-envelope"></i>
      <span class="desktop-only">info@smartfare.it</span>
    </div>

    <div class="right-group d-flex align-items-center gap-3">
      <div class="social desktop-xl-only d-none d-xl-flex gap-2">
        <i class="bi bi-facebook"></i>
        <i class="bi bi-twitter-x"></i>
        <i class="bi bi-instagram"></i>
        <i class="bi bi-linkedin"></i>
      </div>
      <!-- Selezione lingua -->
      <div class="dropdown language-dropdown">
        <button
          class="btn btn-sm btn-light bg-opacity-10 text-white d-flex align-items-center gap-2 rounded-pill px-3 py-1 dropdown-toggle"
          type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-translate"></i>
          <span class="d-none d-md-inline">{{ languages.find(l => l.code === selectedLanguage)?.label ||
            'Language'}}</span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end mt-1 p-0 rounded-3 overflow-hidden">
          @for (lang of languages; track lang.code) {
          <li>
            <button class="dropdown-item d-flex align-items-center gap-2 px-3 py-2" type="button"
              (click)="selectedLanguage = lang.code">
              <span class="fi fi-{{lang.code}}"></span>
              {{ lang.label }}
              @if(selectedLanguage === lang.code){
              <i class="bi bi-check ms-auto text-primary"></i>
              }
            </button>
          </li>
          }
        </ul>
      </div>
    </div>
  </div>
  <!-- MAIN NAVBAR -->
  <div class="main-bar d-flex align-items-center justify-content-between">

    <!-- LOGO -->
    <div class="logo d-flex align-items-center gap-2">
      <span class="logo-mark">S</span>
      <span class="logo-text">SMARTFARE</span>
    </div>

    <!-- NAV LINKS DESKTOP -->
    <div class="nav-links d-none d-lg-flex gap-4">
      @for (item of navItems; track item.label) {
      <a class="nav-item d-flex align-items-center gap-2" [attr.href]="item.route">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
      }
    </div>

    <!-- ACTION BUTTONS DESKTOP -->
    <div class="actions d-none d-lg-flex gap-2">
      <button class="btn login-btn" routerLink="['/login']" >Login</button>
      <button class="btn register-btn" routerLink="['/register']">Register</button>
    </div>

    <!-- MOBILE TOGGLER -->
    <button class="mobile-toggler d-lg-none" (click)="toggleMobileMenu()">
      <i class="bi bi-list"></i>
    </button>

  </div>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" [class.open]="mobileMenuOpen">
    <div class="mobile-menu-header d-flex justify-content-between align-items-center">
      <div class="logo">SMARTFARE</div>
      <button class="close-btn" (click)="toggleMobileMenu()">&times;</button>
    </div>
    <div class="mobile-nav-links d-flex flex-column gap-3">
      @for (item of navItems; track item.label) {
      <a class="nav-item d-flex align-items-center gap-2" [attr.href]="item.route">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
      }
      <button class="btn login-btn w-100">Login</button>
      <button class="btn register-btn w-100">Register</button>
    </div>
  </div>

</nav>

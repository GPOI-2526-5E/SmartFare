<nav class="navbar-shell" data-aos="fade-down">

  <app-top-navbar></app-top-navbar>
  <!-- MAIN NAVBAR -->
  <div class="main-bar d-flex align-items-center justify-content-between" [class.is-pinned]="isPinned">

    <!-- LOGO -->
    <div class="logo d-flex align-items-center gap-2">
      <img class='logo-img' src="favicon.png" alt='smartfareLogo'>
      <span class="logo-text">SMARTFARE</span>
    </div>

    <!-- NAV LINKS DESKTOP -->
    <div class="nav-links d-none d-lg-flex gap-4">
      @for (item of navItems; track item.label) {
      <a class="nav-item d-flex align-items-center gap-2" [routerLink]="item.route">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
      }
    </div>

    <!-- ACTION BUTTONS DESKTOP -->
    <div class="actions d-none d-lg-flex gap-2">
      @if (isAuthenticated) {
      @if (userAvatar) {
        <img [src]="userAvatar" (error)="handleImageError()" alt="User Avatar" class="user-avatar-nav align-self-center pointer" />
      } @else {
        <i class="bi bi-person-circle fs-3 align-self-center"></i>
      }
      <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
      }@else {
      <button class="btn login-btn" (click)="login()">Login</button>
      <a class="btn register-btn" [routerLink]="['/register']">Register</a>
      }
    </div>

    <!-- MOBILE TOGGLER -->
    <button class="mobile-toggler d-lg-none" type="button" (click)="toggleMobileMenu()">
      <i class="bi bi-list"></i>
    </button>

  </div>

  <!-- MOBILE MENU OVERLAY -->
  <div class="mobile-menu" [class.open]="mobileMenuOpen">
    <div class="mobile-menu-header d-flex justify-content-between align-items-center">
      <div class="logo">SMARTFARE</div>
      <button class="close-btn" (click)="toggleMobileMenu()">&times;</button>
    </div>
    <div class="mobile-nav-links d-flex flex-column gap-3">
      @for (item of navItems; track item.label) {
      <a class="nav-item d-flex align-items-center gap-2" [routerLink]="item.route" (click)="closeMobileMenu()">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
      }
      @if (isAuthenticated) {
      <div class="d-flex flex-column gap-2 align-items-center">
        @if (userAvatar) {
          <img [src]="userAvatar" (error)="handleImageError()" alt="User Avatar" class="user-avatar-mobile" />
        } @else {
          <i class="bi bi-person-circle fs-1"></i>
        }
      <button class="btn btn-outline-danger w-100" type="button" (click)="logout()">Logout</button>
      </div>
      }@else {
      <button class="btn login-btn w-100" (click)="login()">Login</button>
      <a class="btn register-btn w-100" [routerLink]="['/register']" (click)="closeMobileMenu()">Register</a>
      }
    </div>
  </div>

</nav>

<section class="booking-search-container">
  <div class="search-card dual-mode-card mb-3">
    <div class="search-row ai-prompt-row position-relative">
      <div class="search-field prompt-field w-100">
        <input type="text" [(ngModel)]="travelQuery" class="w-100 pe-5 placeholder-animated"
          [placeholder]="currentPlaceholder" (keydown.enter)="onAIGenerate()">
      </div>

      <!-- Send Arrow Button inside the input -->
      <button type="button" class="btn-prompt-submit" (click)="onAIGenerate()" [disabled]="!travelQuery.trim()"
        title="Genera con l'IA">
        <i class="bi bi-arrow-up"></i>
      </button>
    </div>
  </div>

  <div class="text-center mt-3 animate-fade-in">
    <span class="text-white-50 fs-6 me-2">Oppure preferisci organizzare tutto nei minimi dettagli?</span>
    <a class="text-decoration-none manual-link fw-bold" (click)="onManualCreate()">Crea Manualmente <i
        class="bi bi-arrow-right-short"></i></a>
  </div>
</section>

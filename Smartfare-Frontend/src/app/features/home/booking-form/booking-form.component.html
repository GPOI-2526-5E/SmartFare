<div class="glass-effect rounded-3xl shadow-2xl p-2 md:p-4 w-full text-left">
  <!-- Titolo dinamico -->
  <div class="px-4 pt-2 pb-3">
    <h2 class="text-2xl md:text-3xl font-bold text-slate-800">
      {{currentConfig.title}}
    </h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4">
    <div class="space-y-1">
      <label class="text-xs font-semibold text-slate-500 uppercase ml-1 flex items-center gap-1">
        <i class="bi bi-geo-alt"></i>
        {{currentConfig.fromLabel}}
      </label>
      <input type="text" [placeholder]="currentConfig.fromLabel" [(ngModel)]="from"
        class="w-full px-4 py-4 rounded-2xl border-none bg-slate-100/50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
    </div>
    <div class="space-y-1">
      <label class="text-xs font-semibold text-slate-500 uppercase ml-1 flex items-center gap-1">
        <i class="bi bi-pin-map"></i>
        {{currentConfig.toLabel}}
      </label>
      <input type="text" [placeholder]="currentConfig.toLabel" [(ngModel)]="to"
        class="w-full px-4 py-4 rounded-2xl border-none bg-slate-100/50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
    </div>
    <div class="space-y-1">
      <label class="text-xs font-semibold text-slate-500 uppercase ml-1 flex items-center gap-1">
        <i class="bi bi-calendar-event"></i>
        {{currentConfig.dateLabel}}
      </label>
      <input type="date" [(ngModel)]="date" [title]="currentConfig.dateLabel"
        class="w-full px-4 py-4 rounded-2xl border-none bg-slate-100/50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all outline-none">
    </div>
    <div class="flex items-end">
      <button (click)="search()" [disabled]="!from() || !to() || !date()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/20 flex items-center justify-center gap-3 transition-all hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
        <i class="bi bi-search"></i>
        <span>{{currentConfig.buttonText}}</span>
      </button>
    </div>
  </div>
</div>

<section class="booking-panel">
  <header>
    <p>Planner</p>
    <h3>{{ currentConfig.title }}</h3>
  </header>

  <div class="field-grid">
    <label>
      <span><i class="bi bi-geo-alt"></i> {{ currentConfig.fromLabel }}</span>
      <input type="text" [placeholder]="currentConfig.fromLabel" [(ngModel)]="from" />
    </label>

    <label>
      <span><i class="bi bi-pin-map"></i> {{ currentConfig.toLabel }}</span>
      <input type="text" [placeholder]="currentConfig.toLabel" [(ngModel)]="to" />
    </label>

    <label>
      <span><i class="bi bi-calendar-event"></i> {{ currentConfig.dateLabel }}</span>
      <input type="date" [title]="currentConfig.dateLabel" [(ngModel)]="date" />
    </label>

    <button type="button" (click)="search()" [disabled]="!from() || !to() || !date()">
      <i class="bi bi-arrow-up-right-circle"></i>
      <span>{{ currentConfig.buttonText }}</span>
    </button>
  </div>
</section>

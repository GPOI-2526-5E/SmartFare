<section class="booking-search" aria-label="Travel booking form">
  <div class="booking-categories d-flex flex-wrap align-items-center gap-2 gap-md-3">
    @for (type of bookingTypes; track type.label) {
    <button type="button" class="category-btn" [class.active]="activeType === type.label"
      (click)="setActiveType(type.label)">
      <i class="bi" [class]="'bi ' + type.icon" aria-hidden="true"></i>
      <span>{{ type.label }}</span>
    </button>
    }
  </div>

  <div class="booking-card">
    <form class="row g-3 g-lg-4 align-items-end align-items-lg-stretch" (submit)="onSubmit($event)">
      <div class="col-12 col-lg-4 col-xl-4">
        <label class="field-label" for="destination">Destination or Hotel Name</label>
        <div class="field-control">
          <i class="bi bi-geo-alt" aria-hidden="true"></i>
          <input id="destination" name="destination" type="text" [placeholder]="destinationPlaceholder"
            autocomplete="off" />
        </div>
      </div>

      <div class="col-12 col-lg-3 col-xl-3">
        <label class="field-label">Check In - Out</label>
        <div class="field-control date-range-grid">
          <i class="bi bi-calendar4-week" aria-hidden="true"></i>
          <input id="checkin" name="checkin" type="date" [attr.min]="today" aria-label="Check in date"
            title="Check in date" />
          <span class="range-separator">-</span>
          <input id="checkout" name="checkout" type="date" [attr.min]="today" aria-label="Check out date"
            title="Check out date" />
        </div>
      </div>

      <div class="col-12 col-lg-3 col-xl-3">
        <label class="field-label">Rooms and Guests</label>
        <div class="field-control guests-grid">
          <i class="bi bi-person" aria-hidden="true"></i>
          <input id="rooms" name="rooms" type="number" min="1" value="2" aria-label="Rooms" />
          <span class="small-label">Rooms</span>
          <input id="guests" name="guests" type="number" min="1" value="3" aria-label="Guests" />
          <span class="small-label">Guests</span>
        </div>
      </div>

      <div class="col-12 col-lg-2 col-xl-2 d-grid">
        <button type="submit" class="search-btn">
          <i class="bi bi-search"></i>
          <span>Search</span>
        </button>
      </div>
    </form>
  </div>
</section>

<section class="booking-search" aria-label="Travel booking form">
  <div class="booking-categories d-flex flex-nowrap flex-md-wrap align-items-center gap-2 gap-md-3 overflow-auto pb-2">
    @for (type of bookingTypes; track type.label) {
    <button type="button" class="category-btn" [class.active]="activeType === type.label"
      (click)="setActiveType(type.label)">
      <i class="bi" [class]="'bi ' + type.icon" aria-hidden="true"></i>
      <span>{{ type.label }}</span>
    </button>
    }
  </div>

  <div class="booking-card shadow-sm bg-white rounded-3 p-3 p-md-4">
    <form class="row g-3 g-lg-4 align-items-end align-items-lg-stretch" (submit)="onSubmit($event)">
      <div class="col-12 col-md-6 col-lg-4 mb-2 mb-lg-0">
        <label class="field-label mb-1" for="destination">Destinazione o Hotel</label>
        <div class="input-group field-control">
          <span class="input-group-text bg-transparent border-0 px-0"><i class="bi bi-geo-alt"
              aria-hidden="true"></i></span>
          <input id="destination" name="destination" type="text" class="form-control border-0 shadow-none px-1"
            [placeholder]="destinationPlaceholder" autocomplete="off" />
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-3 mb-2 mb-lg-0">
        <label class="field-label mb-1">Check In - Out</label>
        <div class="input-group field-control flex-nowrap">
          <span class="input-group-text bg-transparent border-0 px-0"><i class="bi bi-calendar4-week"
              aria-hidden="true"></i></span>
          <input id="checkin" name="checkin" type="date" class="form-control border-0 shadow-none px-1"
            [attr.min]="today" aria-label="Check in date" title="Check in date" />
          <span class="input-group-text bg-transparent border-0 px-1 range-separator">-</span>
          <input id="checkout" name="checkout" type="date" class="form-control border-0 shadow-none px-1"
            [attr.min]="today" aria-label="Check out date" title="Check out date" />
        </div>
      </div>

      <div class="col-12 col-md-8 col-lg-3 mb-2 mb-lg-0">
        <label class="field-label mb-1">Camere e Ospiti</label>
        <div class="input-group field-control guests-grid flex-nowrap">
          <span class="input-group-text bg-transparent border-0 px-0"><i class="bi bi-person"
              aria-hidden="true"></i></span>
          <input id="rooms" name="rooms" type="number" min="1" value="2" class="form-control border-0 shadow-none px-1"
            aria-label="Rooms" style="max-width: 4rem;" />
          <span class="input-group-text bg-transparent border-0 px-1 small-label">Camere</span>
          <input id="guests" name="guests" type="number" min="1" value="3"
            class="form-control border-0 shadow-none px-1" aria-label="Guests" style="max-width: 4rem;" />
          <span class="input-group-text bg-transparent border-0 px-1 small-label">Ospiti</span>
        </div>
      </div>

      <div class="col-12 col-md-4 col-lg-2 d-grid">
        <button type="submit" class="search-btn btn btn-primary btn-lg w-100">
          <i class="bi bi-search"></i>
          <span>Cerca</span>
        </button>
      </div>
    </form>
  </div>
</section>

<section class="featured-itineraries">
  <div class="container">
    <div class="section-header">
      <div class="section-title">
        <h2>Itinerari in Evidenza</h2>
        <p>Viaggi selezionati a mano per ispirare la tua anima.</p>
      </div>
      <div class="section-nav">
        <a routerLink="/discover" class="see-more-btn">
          Vedi di più <i class="bi bi-arrow-right"></i>
        </a>
      </div>
    </div>

    <div class="itinerary-grid">
      @if (loading) {
      <app-loader [show]="loading"></app-loader>
      } @else {
      @for (itinerary of itineraries; track itinerary.id) {
        <app-itinerary-card [itinerary]="itinerary" mode="link"></app-itinerary-card>
      }
      @if (!loading && (!itineraries || itineraries.length === 0)) {
      <div class="empty-state">
        <p>Nessun itinerario trovato</p>
      </div>
      }
    }
    </div>
  </div>
</section>

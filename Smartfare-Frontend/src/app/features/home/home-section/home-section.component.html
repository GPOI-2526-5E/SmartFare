<div class="travel-hero-page position-relative min-vh-100 d-flex flex-column" >
  <div class="background-layer w-100 h-100 position-absolute top-0 start-0"
    [style.background-image]="'url(' + heroContent.backgroundImageUrl + ')'">
    <div class="overlay w-100 h-100 position-absolute top-0 start-0"></div>
  </div>

  <div class="content-layer position-relative z-1 d-flex flex-column min-vh-100">
    <app-navbar></app-navbar>

    <main class="container hero-content-wrap flex-grow-1 d-flex align-items-center justify-content-center">
      <div class="row w-100 justify-content-center text-center">
        <div class="col-12 col-lg-10 mx-auto">
          <span class="badge rounded-pill text-bg-light px-3 py-2 mb-3">SmartFare Tickets</span>
          <h1 class="hero-title mb-3">
            {{ heroContent.title }}
            <span>With MyTravel</span>
          </h1>
          <p class="hero-subtitle mx-auto mb-4">{{ heroContent.subtitle }}</p>
          <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 gap-sm-3 mt-4">
            <button class="btn btn-primary btn-lg px-4 mb-2 mb-sm-0">{{ heroContent.primaryActionLabel }}</button>
            @if (heroContent.secondaryActionLabel) {
            <button class="btn btn-outline-light btn-lg px-4">{{ heroContent.secondaryActionLabel }}</button>
            }
          </div>
        </div>
      </div>
    </main>

    <div class="booking-form-wrap w-100 d-flex justify-content-center align-items-end">
      <div class="w-100" style="max-width:1140px;">
        <app-booking-form></app-booking-form>
      </div>
    </div>
  </div>
</div>

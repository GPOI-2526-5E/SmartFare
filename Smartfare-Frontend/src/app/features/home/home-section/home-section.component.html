<div class="travel-hero-page position-relative min-vh-100 d-flex flex-column">
  <div class="background-layer w-100 h-100 position-absolute top-0 start-0">
    @for (videoSrc of videoLayers; track $index) {
    <video #backgroundVideo class="background-video" [class.is-active]="$index === activeVideoLayer"
      [attr.src]="videoSrc" [attr.autoplay]="$index === activeVideoLayer ? '' : null" muted
      [attr.loop]="$index === activeVideoLayer ? '' : null"
      [attr.preload]="$index === activeVideoLayer ? 'auto' : 'metadata'" (loadeddata)="onVideoLoaded($index)"></video>
    }
    <div class="overlay w-100 h-100 position-absolute top-0 start-0"></div>
  </div>

  <div class="content-layer position-relative z-1 min-vh-100">
    <app-navbar></app-navbar>

    <main class="container hero-content-wrap">
      <div class="row w-100 justify-content-center text-center">
        <div class="col-12 col-lg-10 mx-auto" appRevealOnScroll="fade-up">
          <span class="badge rounded-pill text-bg-light px-3 py-2 mb-3">SmartFare Tickets</span>
          <h1 class="hero-title mb-3">
            <span class="typing-line">
              {{ heroLineTop() }}
            </span>
            <span class="typing-line hero-title-accent">
              {{ heroLineBottom() }}
            </span>
          </h1>
        </div>
      </div>
    </main>

    <div class="booking-form-wrap w-100 d-flex justify-content-center align-items-end" data-aos="fade-up">
      <div class="booking-form-inner w-100">
        <app-ai-prompt-bar appRevealOnScroll="fade-up" [revealDelay]="140"></app-ai-prompt-bar>
      </div>
    </div>
  </div>
</div>

<!-- Experiences Intro Divider -->
<div class="experiences-intro-section text-center">
  <div class="container">
    <div class="d-inline-flex accent-pill mb-4" appRevealOnScroll="fade-up">
      <div class="pulse-dot"></div>
      <span class="pill-text ms-2">Scopri di più</span>
    </div>
    <h2 class="intro-headline" appRevealOnScroll="fade-up" [revealDelay]="100">Le Nostre Esperienze</h2>
    <div class="d-flex justify-content-center mb-4" appRevealOnScroll="fade-up" [revealDelay]="150">
      <div class="glow-separator"></div>
    </div>
    <p class="intro-subtitle" appRevealOnScroll="fade-up" [revealDelay]="200">
      Lasciati ispirare dalle nostre destinazioni migliori. Dai paradisi tropicali alle vette innevate, trova la tua
      prossima avventura.
    </p>
  </div>
</div>

<!-- Experiences Carousel Section -->
<app-experiences-carousel></app-experiences-carousel>

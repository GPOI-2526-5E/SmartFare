<section class="auth-wrap">
  <article class="auth-card">
    <header class="auth-header">
      <p class="kicker">Nuovo utente</p>
      <h2>Crea il tuo profilo SmartFare</h2>
    </header>

    <label>
      <span>Email</span>
      <input type="email" placeholder="nome@email.it" [(ngModel)]="email" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" placeholder="Crea password" [(ngModel)]="password" />
    </label>

    <button type="button" (click)="Register()">Registrati</button>

    <p class="auth-foot">
      Hai già un account? <a routerLink="/login">Accedi</a>
    </p>
  </article>
</section>

<section class="auth-wrap">
  <article class="auth-card">
    <header class="auth-header">
      <p class="kicker">Nuovo utente</p>
      <h2>Crea il tuo profilo SmartFare</h2>
    </header>

    <label>
      <span>Nome</span>
      <input type="text" placeholder="Mario Rossi" />
    </label>

    <label>
      <span>Email</span>
      <input type="email" placeholder="nome@email.it" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" placeholder="Crea password" />
    </label>

    <button type="button">Registrati</button>

    <p class="auth-foot">
      Hai già un account? <a routerLink="/login">Accedi</a>
    </p>
  </article>
</section>

<section class="auth-wrap">
    <article class="auth-card">
        <p class="kicker">Bentornato</p>
        <h2>Accedi al tuo spazio SmartFare</h2>

        <label>
            <span>Email</span>
            <input type="email" placeholder="nome@email.it" [(ngModel)]="email" />
        </label>

        <label>
            <span>Password</span>
            <input type="password" placeholder="Inserisci password" [(ngModel)]="password" />
        </label>

        <button type="button" (click)="Login()">Entra ora</button>
    </article>
</section>

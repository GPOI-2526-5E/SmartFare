<section class="auth-wrap">
  <article class="auth-card">
    <header class="auth-header">
      <p class="kicker">Bentornato</p>
      <h2>Accedi al tuo spazio SmartFare</h2>
    </header>

    <label>
      <span>Email</span>
      <input type="email" placeholder="nome@email.it" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" placeholder="Inserisci password" />
    </label>

    <button type="button">Entra ora</button>

    <p class="auth-foot">
      Non hai ancora un account? <a routerLink="/register">Registrati</a>
    </p>
  </article>
</section>

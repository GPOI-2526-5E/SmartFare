<div class="login-hero-page" >
  <div class="background-layer"></div>
  <div class="overlay"></div>
  <div class="content-layer">
    <app-navbar class="navbar-overlay"></app-navbar>
    <div class="login-container">
      <div class="login-left">
        <div class="welcome-content">
          <div class="logo">SMARTFARE</div>
          <h1><span class="bold">Welcome</span>, accedi al tuo account</h1>
        </div>
      </div>
      <div class="login-right">
        <form class="login-form-wrapper" (submit)="Login()">
          <h2>Login</h2>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Inserisci la tua email" [(ngModel)]="email" name="email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Inserisci la password" [(ngModel)]="password"
              name="password" />
          </div>
          <button type="submit" class="register-btn">Accedi</button>
        </form>
      </div>
    </div>
  </div>
</div>

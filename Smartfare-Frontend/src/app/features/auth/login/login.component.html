<div class="login-hero-page">
  <div class="background-layer"></div>
  <div class="animated-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="overlay"></div>

  <div class="content-layer">
    <app-navbar class="navbar-overlay"></app-navbar>

    <div class="login-container">
      <div class="glass-card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header">
          <h2 class="logo-text">Smart<span class="text-accent">Fare</span></h2>
          <p class="subtitle">Bentornato! Accedi al tuo account per continuare.</p>
        </div>

        <form class="login-form-wrapper" (submit)="Login()">
          <div class="form-group floating-input">
            <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder=" " />
            <label for="email">Indirizzo Email</label>
          </div>

          <div class="form-group floating-input">
            <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder=" " />
            <label for="password">Password</label>
          </div>

          <div class="form-actions">
            <!-- link opzionale, non c'è una rotta password persa in questo codice base, uso routerLink se mi serve o semplicemente "#" -->
            <a href="javascript:void(0)" class="forgot-link">Hai dimenticato la password?</a>
          </div>

          <button type="submit" class="register-btn">
            <span>Accedi</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>

          <div class="google-login-container">
            <div class="login-divider">
              <span>oppure continua con</span>
            </div>
            
            <div class="google-btn-wrapper">
              <asl-google-signin-button type="standard" size="large" text="signin_with" shape="rectangular" theme="outline"></asl-google-signin-button>
            </div>
          </div>

          <div class="register-prompt">
            <p>Non hai un account? <a [routerLink]="['/register']" class="register-link">Registrati ora</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

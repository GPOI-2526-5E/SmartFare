<div class="login-hero-page">
  <div class="background-layer"></div>
  <div class="animated-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="overlay"></div>

  <div class="content-layer">
    <app-navbar class="navbar-overlay"></app-navbar>

    <div class="login-container">
      <div class="glass-card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header">
          <h2 class="logo-text">Smart<span class="text-accent">Fare</span></h2>
          <p class="subtitle">Scegli una nuova password sicura per il tuo account.</p>
        </div>

        <!-- Error state without form -->
        <div *ngIf="!token" style="text-align: center; color: #f8fafc;">
          <div style="font-size: 48px; color: #ef4444; margin-bottom: 20px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
          </div>
          <h3 style="font-size: 20px; font-weight: 600; margin-bottom: 10px;">Token Mancante</h3>
          <p style="color: #94a3b8; margin-bottom: 24px;">Il link per il recupero sembra non essere valido o è scaduto.</p>
          <a routerLink="/forgot-password" class="register-btn" style="text-decoration: none;">
            <span>Richiedi nuovo link</span>
          </a>
        </div>

        <!-- Normal Form -->
        <form *ngIf="token" class="login-form-wrapper" (ngSubmit)="onSubmit()" #resetForm="ngForm">
          
          <div class="form-group floating-input">
            <input id="newPassword" type="password" [(ngModel)]="newPassword" name="newPassword" minlength="8" required placeholder=" " #newPswInput="ngModel" />
            <label for="newPassword">Nuova password</label>
          </div>

          <div class="form-group floating-input">
            <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder=" " #confPswInput="ngModel" />
            <label for="confirmPassword">Conferma nuova password</label>
            <div *ngIf="confirmPassword && confirmPassword !== newPassword" style="color: #ef4444; font-size: 13px; margin-top: 8px;">
              Le password non corrispondono
            </div>
          </div>

          <button type="submit" class="register-btn" [disabled]="isSubmitting || resetForm.invalid || confirmPassword !== newPassword">
            <span *ngIf="!isSubmitting">Aggiorna Password</span>
            <span *ngIf="isSubmitting" class="spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Attendi...</span>
            <svg *ngIf="!isSubmitting" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <polyline points="9 12 11 14 15 10"></polyline>
            </svg>
          </button>
        </form>
        
      </div>
    </div>
  </div>
</div>

<div class="login-hero-page">
  <div class="background-layer"></div>
  <div class="animated-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="overlay"></div>

  <div class="content-layer">
    <app-navbar class="navbar-overlay"></app-navbar>

    <div class="login-container">
      <div class="glass-card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header">
          <h2 class="logo-text">Smart<span class="text-accent">Fare</span></h2>
          <p class="subtitle">Recupero Password! Ti invieremo un link per accedere nuovamente al tuo account.</p>
        </div>

        <form class="login-form-wrapper" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
          <div class="form-group floating-input">
            <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder=" " #emailInput="ngModel" />
            <label for="email">Indirizzo Email</label>
          </div>

          <div class="form-actions" style="justify-content: center; margin-top: 1rem;">
             <a routerLink="/login" class="forgot-link" style="color: #7ea8ff;"><i class="fa-solid fa-arrow-left"></i> Torna al Login</a>
          </div>

          <button type="submit" class="register-btn" [disabled]="isSubmitting || !emailInput.valid">
            @if (!isSubmitting) {
              <span>Invia Link</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            } @else {
              <span class="spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Invio...</span>
            }
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

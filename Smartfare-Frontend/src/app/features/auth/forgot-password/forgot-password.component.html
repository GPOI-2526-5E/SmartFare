<div class="auth-page mt-5">
  <div class="background-canvas-container">
    <div class="world-map-layer"></div>
    <canvas #authCanvas class="auth-bg-canvas"></canvas>
  </div>
  <app-navbar class="auth-navbar"></app-navbar>
  
  <div class="auth-wrapper">
    <!-- Left Side: Content -->
    <div class="auth-content">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-container">
            <h2 class="logo-text">Smart<span class="text-accent">fare</span></h2>
          </div>
          <h1 class="welcome-text">Password dimenticata?</h1>
          <p class="subtitle">Inserisci la tua email e ti invieremo un link per reimpostare la tua password.</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
          <div class="form-group">
            <label for="email">Indirizzo Email</label>
            <div class="input-wrapper">
              <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="nome@esempio.com" #emailInput="ngModel" />
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="isSubmitting || !emailInput.valid">
            @if (!isSubmitting) {
              <span>Invia Link</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            } @else {
              <span class="spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Invio in corso...</span>
            }
          </button>

          <div class="auth-footer">
            <p>Ricordi la password? <a routerLink="/login" class="link">Torna al Login</a></p>
          </div>
        </form>
      </div>
    </div>

    <!-- Right Side: Visual -->
    <div class="auth-visual">
      <div class="visual-content">
        <h1 class="visual-title">Non perderti <br> per strada.</h1>
        <p class="visual-subtitle">Ti aiutiamo noi a ritrovare l'accesso al tuo prossimo grande itinerario di viaggio.</p>
      </div>
      <div class="visual-overlay"></div>
    </div>
  </div>
</div>

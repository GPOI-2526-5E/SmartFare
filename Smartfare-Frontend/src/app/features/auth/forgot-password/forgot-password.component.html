<div class="auth-page">
  <div class="background-canvas-container">
    <div class="world-map-layer"></div>
    <canvas #authCanvas class="auth-bg-canvas"></canvas>
  </div>
  <app-navbar class="auth-navbar"></app-navbar>

  <div class="auth-wrapper">
    <!-- Left Side: Visual -->
    <div class="auth-visual">
      <div class="visual-content">
        <h1 class="visual-title">Torna in <br> carreggiata.</h1>
        <p class="visual-subtitle">Recupera l'accesso al tuo profilo e riprendi a pianificare i tuoi viaggi.</p>
        
        <div class="location-badge">
          <span class="location-icon">🌍</span>
          <div class="location-details">
            <span class="location-name">Smartfare Hub</span>
            <span class="location-desc">Il tuo compagno di viaggio intelligente</span>
          </div>
        </div>
      </div>
      <div class="visual-overlay"></div>
    </div>

    <!-- Right Side: Content -->
    <div class="auth-content">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo-container">
            <h2 class="logo-text">Smart<span class="text-accent">fare</span></h2>
          </div>
          <h1 class="welcome-text">Password dimenticata?</h1>
          <p class="subtitle">Inserisci la tua email per ricevere un link di recupero.</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
          <div class="form-group">
            <label for="email">Indirizzo Email</label>
            <div class="input-wrapper">
              <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="nome@esempio.it" #emailInput="ngModel" />
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="isSubmitting || forgotForm.invalid">
            @if (!isSubmitting) {
              <span>Invia Link di Recupero</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            } @else {
              <span class="spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Invio in corso...</span>
            }
          </button>
        </form>

        <div class="auth-footer">
          <p>Ti sei ricordato la password? <a routerLink="/login" class="link">Accedi</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

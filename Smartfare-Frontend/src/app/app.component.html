<app-alert></app-alert>
<app-loader [show]="isLoading()" [message]="loaderMessage()"></app-loader>

<div class="app-shell" [class.sidebar-collapsed]="!isSidebarOpen()">
  <app-sidebar></app-sidebar>

  <div class="content-shell">
    <main class="content-main container-fluid px-2 px-md-3 pb-3 pb-md-4">
      <section class="sf-surface app-main sf-reveal">
        <router-outlet></router-outlet>
      </section>
    </main>

    <footer class="app-footer container-fluid px-2 px-md-3 pb-3 pb-md-4">
      <section class="sf-surface footer-panel p-3 p-md-4">
        <div class="row g-3 g-md-4 align-items-start">
          <div class="col-lg-4">
            <div class="footer-brand">
              <span class="footer-logo"><i class="bi bi-stars"></i></span>
              <div>
                <h4>SmartFare</h4>
                <p>Travel Intelligence for modern urban explorers.</p>
              </div>
            </div>

            <div class="footer-social">
              <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
              <a href="#" aria-label="X"><i class="bi bi-twitter-x"></i></a>
              <a href="#" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
              <a href="#" aria-label="Youtube"><i class="bi bi-youtube"></i></a>
            </div>
          </div>

          <div class="col-6 col-lg-2">
            <p class="footer-title">Navigate</p>
            <nav class="footer-links">
              <a routerLink="/">Hub</a>
              <a routerLink="/home">Planner</a>
              <a routerLink="/about">Studio</a>
            </nav>
          </div>

          <div class="col-6 col-lg-2">
            <p class="footer-title">Account</p>
            <nav class="footer-links">
              <a routerLink="/login">Login</a>
              <a routerLink="/register">Signup</a>
              <a routerLink="/support">Support</a>
            </nav>
          </div>

          <div class="col-lg-4">
            <p class="footer-title">Update Feed</p>
            <div class="footer-note">
              <p>Ricevi trend prezzi, finestre di prenotazione e suggerimenti settimanali.</p>
              <button type="button">Attiva aggiornamenti</button>
            </div>
          </div>
        </div>

        <div class="footer-bottom mt-3 pt-3">
          <small>2026 SmartFare Labs. Built for fast decision travel.</small>
        </div>
      </section>
    </footer>
  </div>
</div>

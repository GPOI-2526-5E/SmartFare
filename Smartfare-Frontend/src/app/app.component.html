<div class="app-container" [class.sidebar-collapsed]="!isSidebarOpen() && !isMobile()">
  <!-- Header mobile con hamburger menu -->
  @if (isMobile()) {
    <header class="mobile-header">
      <button class="hamburger-btn" (click)="toggleSidebar()" type="button" aria-label="Toggle menu">
        <i class="bi" [class.bi-list]="!isSidebarOpen()" [class.bi-x-lg]="isSidebarOpen()"></i>
      </button>
      <div class="mobile-logo">
        <i class="bi bi-airplane-engines"></i>
        <span>SmartFare</span>
      </div>
    </header>
  }

  <!-- Backdrop per chiudere la sidebar SOLO su mobile -->
  @if (isSidebarOpen() && isMobile()) {
    <div class="sidebar-backdrop" (click)="closeSidebarOnMobile()"></div>
  }

  <app-sidebar></app-sidebar>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
